name: Update World Cup channels

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh World Cup channels
        run: sh scripts/update-world-cup.sh
      - name: Commit changes
        run: |
          if git diff --quiet -- cqcu-unicast.m3u; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cqcu-unicast.m3u
          git commit -m "Update World Cup channels"
          git push
